[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.20"
evm_version = "paris"

# See more config options https://github.com/foundry-rs/foundry/tree/master/crates/config

[fmt]
line_length = 120
tab_width = 4
number_underscore = "preserve"
int_types = "long"
quote_style = "double"
multiline_func_header = "attributes_first"

[rpc_endpoints]
anvil = "http://localhost:8545"
sepolia = "${SEPOLIA_RPC}"
